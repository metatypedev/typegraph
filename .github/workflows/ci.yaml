name: ci

on:
  push:
    branches:
    - main
  pull_request:

jobs:
  release-check:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    outputs:
      release: ${{ steps.Check.outputs.release }}

    steps:
      - name: Check out
        uses: actions/checkout@v2
      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: 3.8
      - name: Install poetry
        uses: abatilo/actions-poetry@v2.0.0
        with:
          poetry-version: 1.1.12
      - name: Check2
        run: |
          poetry --version
          poetry version -s
      - name: Check
        run: |
          VERSION=$(poetry version -s)
          echo $VERSION
          ALREADY_RELEASED=$(curl -s https://pypi.org/pypi/typegraph/json | jq ".releases | keys | any(. == \"$VERSION\")")
          echo $ALREADY_RELEASED
          echo "::set-output release=$([[ "$ALREADY_RELEASED" == "true" ]] && echo "" || $VERSION)"

  publish:
    needs: release-check
    runs-on: ubuntu-latest
    if: needs.release-check.outputs.release != ''

    steps:
      - name: Check out
        uses: actions/checkout@v2
      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: 3.8
      - name: Install poetry
        uses: abatilo/actions-poetry@v2.0.0
      - name: Publish
        env:
          POETRY_PYPI_TOKEN_PYPI: ${{ secrets.PYPI_TOKEN }}
        run: |
          python -m pip install --upgrade pip
          poetry install
          poetry build
          poetry publish
      - uses: actions-ecosystem/action-push-tag@v1
        with:
          tag: ${{ needs.release-check.outputs.release }}
      - name: GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.release-check.outputs.release }}
          #prerelease: "true"
          body: |
            See [changelog](https://github.com/${{ env.GITHUB_REPOSITORY }}/blob/${{ needs.release-check.outputs.release }}/CHANGELOG.md).
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
